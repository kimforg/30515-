
animation_html = """
<!DOCTYPE html>
<html lang="ko">
<head>
<style>
  body {
    font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
    background-color: #ffffff;
    margin: 0;
    padding: 20px;
  }
  .container {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .track-container {
    position: relative;
    width: 100%;
    height: 100px;
    background: #f8f9fa;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    padding: 0 20px;
    box-sizing: border-box;
    overflow: hidden;
  }
  .label {
    width: 150px;
    font-weight: 800;
    font-size: 16px;
    color: #343a40;
    z-index: 4;
  }
  .track-line {
    position: absolute;
    left: 170px;
    right: 50px;
    height: 4px;
    background: #dee2e6;
    z-index: 1;
    border-radius: 2px;
  }
  .model-node {
    position: absolute;
    left: 55%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #ffffff;
    border: 4px solid #ced4da;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    color: #495057;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .model-node span {
    font-size: 11px;
    color: #868e96;
    margin-top: 4px;
  }
  .data-dot {
    position: absolute;
    left: 170px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #339af0;
    z-index: 3;
    box-shadow: 0 0 12px rgba(51, 154, 240, 0.6);
  }

  /* 1. 기존 머신러닝: 빠르지만 밋밋한 흐름 */
  .dot-ml { animation: moveML 3s infinite linear; }
  @keyframes moveML {
    0% { left: 170px; }
    100% { left: calc(100% - 50px); }
  }

  /* 2. 100% LLM: 중앙 노드에서 병목 현상 발생 (막힘 시각화) */
  .dot-llm { animation: moveLLM 4s infinite; }
  .node-llm { border-color: #ffa94d; }
  @keyframes moveLLM {
    0% { left: 170px; background: #339af0; }
    30% { left: calc(55% - 40px); background: #339af0; } /* LLM 진입 */
    40% { left: calc(55% - 10px); background: #fa5252; transform: scale(1.3); box-shadow: 0 0 15px #fa5252; } /* 과부하/병목 시작 */
    70% { left: calc(55% + 10px); background: #fa5252; transform: scale(1.3); box-shadow: 0 0 15px #fa5252; } /* 막혀서 느리게 이동 */
    80% { left: calc(55% + 40px); background: #339af0; transform: scale(1); box-shadow: 0 0 12px rgba(51, 154, 240, 0.6); } /* 통과 */
    100% { left: calc(100% - 50px); background: #339af0; }
  }

  /* 3. 하이브리드 AI: 막힘없이 아주 부드럽고 빠른 흐름 */
  .dot-hybrid { 
    animation: moveHybrid 2s infinite linear; 
    background: #20c997; /* 하이브리드는 더 긍정적인 청록색으로 표현 */
    box-shadow: 0 0 15px rgba(32, 201, 151, 0.8);
  }
  .node-hybrid { border-color: #20c997; }
  @keyframes moveHybrid {
    0% { left: 170px; }
    100% { left: calc(100% - 50px); }
  }
</style>
</head>
<body>

    <div class="track-container">
      <div class="label">기존 머신러닝</div>
      <div class="track-line"></div>

    </div>

      <div class="track-line"></div>
      <div class="model-node node-llm">LLM<span>병목/응답지연</span></div>

    </div>

    <div class="track-container">
      <div class="label">하이브리드 AI</div>

      <div class="data-dot dot-hybrid"></div>
    </div>

  </div>

</html>
